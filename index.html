<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Careers | Constructive Reach</title>
    <style>
        :root { --primary: #2563eb; --dark: #1e293b; --bg: #f8fafc; }
        body { font-family: 'Inter', sans-serif; background-color: var(--bg); color: var(--dark); margin: 0; padding: 20px; display: flex; flex-direction: column; min-height: 100vh; }
        
        .container { max-width: 650px; margin: auto; background: white; padding: 40px; border-radius: 16px; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); }
        
        h1 { margin-top: 0; font-size: 24px; color: var(--primary); text-align: center; }
        p.subtitle { text-align: center; color: #64748b; margin-bottom: 30px; }

        .form-group { margin-bottom: 20px; }
        label { display: block; font-weight: 600; margin-bottom: 8px; font-size: 14px; }
        
        input, select, textarea { 
            width: 100%; padding: 12px; border: 1px solid #e2e8f0; border-radius: 8px; 
            font-size: 16px; transition: all 0.2s; box-sizing: border-box;
        }
        
        input:focus { outline: none; border-color: var(--primary); ring: 2px solid var(--primary); }

        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }

        .btn-submit { 
            background: var(--primary); color: white; border: none; padding: 16px; 
            width: 100%; border-radius: 8px; font-weight: 700; cursor: pointer; 
            font-size: 16px; margin-top: 10px; transition: opacity 0.2s;
        }
        .btn-submit:hover { opacity: 0.9; }

        footer { text-align: center; padding: 20px; font-size: 13px; color: #94a3b8; margin-top: auto; }

        @media (max-width: 500px) { .grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

<div class="container">
    <h1>Constructive Reach</h1>
    <p class="subtitle">Candidate Information Portal</p>

    <form name="candidate_application" method="POST" data-netlify="true" enctype="multipart/form-data">
        <input type="hidden" name="form-name" value="candidate_application">

        <div class="grid">
            <div class="form-group">
                <label>Full Name</label>
                <input type="text" name="full_name" placeholder="Enter name" required>
            </div>
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" name="email" placeholder="email@domain.com" required>
            </div>
        </div>

        <div class="grid">
            <div class="form-group">
                <label>Phone Number</label>
                <input type="tel" name="phone" placeholder="+123..." required>
            </div>
            <div class="form-group">
                <label>LinkedIn Profile</label>
                <input type="url" name="linkedin" placeholder="https://...">
            </div>
        </div>

        <div class="grid">
            <div class="form-group">
                <label>Experience Level</label>
                <select name="experience" required>
                    <option value="entry">0-2 Years</option>
                    <option value="mid">3-5 Years</option>
                    <option value="senior">5+ Years</option>
                </select>
            </div>
            <div class="form-group">
                <label>Monthly Salary Expectation</label>
                <input type="text" name="salary" placeholder="e.g. $5000" required>
            </div>
        </div>

        <div class="form-group">
            <label>Upload Resume (PDF only)</label>
            <input type="file" name="resume" accept=".pdf" required>
        </div>

        <div class="form-group">
            <label>Cover Letter / Additional Info</label>
            <textarea name="message" rows="4" placeholder="Tell us why you are a good fit..."></textarea>
        </div>

        <button type="submit" class="btn-submit">Submit Application</button>
    </form>
    </div>

<footer>
    © 2026 Constructive Reach. Professional Recruitment Services.
</footer>

</body>
</html>
