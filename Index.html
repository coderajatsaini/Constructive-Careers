<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Careers | Constructive Reach</title>
    <style>
        :root { 
            --primary: #00A896; /* Logo Teal */
            --secondary: #028090; /* Deep Sea Blue */
            --accent: #05668D; /* Logo Navy */
            --bg-gradient: linear-gradient(135deg, #00A896 0%, #028090 50%, #05668D 100%);
        }
        
        body { 
            font-family: 'Inter', system-ui, -apple-system, sans-serif; 
            background: var(--bg-gradient);
            background-attachment: fixed;
            margin: 0; 
            padding: 20px; 
            display: flex; 
            flex-direction: column; 
            min-height: 100vh; 
            color: #1e293b;
        }
        
        .container { 
            max-width: 650px; 
            margin: auto; 
            background: rgba(255, 255, 255, 0.92); 
            backdrop-filter: blur(12px);
            padding: 40px; 
            border-radius: 28px; 
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25); 
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

        .logo-box { text-align: center; margin-bottom: 25px; }
        .logo-box img { max-width: 200px; height: auto; filter: drop-shadow(0 5px 15px rgba(0,0,0,0.1)); }
        
        h1 { margin: 0; font-size: 26px; color: var(--accent); text-align: center; font-weight: 800; letter-spacing: -0.5px; }
        p.subtitle { text-align: center; color: #64748b; margin-top: 5px; margin-bottom: 30px; font-weight: 500; }

        .form-group { margin-bottom: 22px; }
        label { display: block; font-weight: 700; margin-bottom: 8px; font-size: 13px; color: var(--secondary); text-transform: uppercase; letter-spacing: 0.5px; }
        
        input, select, textarea { 
            width: 100%; padding: 14px; border: 2px solid #e2e8f0; border-radius: 14px; 
            font-size: 16px; transition: all 0.3s ease; box-sizing: border-box;
            background: rgba(248, 250, 252, 0.8);
        }

        input:focus, select:focus, textarea:focus { 
            outline: none; border-color: var(--primary); 
            background: white;
            box-shadow: 0 0 0 4px rgba(0, 168, 150, 0.15);
        }

        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }

        .btn-submit { 
            background: linear-gradient(to right, var(--primary), var(--secondary));
            color: white; border: none; padding: 18px; width: 100%; border-radius: 14px; 
            font-weight: 700; cursor: pointer; font-size: 17px; margin-top: 15px;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 10px 20px -5px rgba(0, 168, 150, 0.4);
        }
        
        .btn-submit:hover { 
            transform: translateY(-3px);
            box-shadow: 0 20px 25px -5px rgba(0, 168, 150, 0.5);
        }

        footer { text-align: center; padding: 30px; font-size: 13px; color: white; margin-top: auto; font-weight: 600; }

        @media (max-width: 500px) { .grid { grid-template-columns: 1fr; } .container { padding: 30px 20px; } }
    </style>
</head>
<body>

<div class="container">
    <div class="logo-box">
        <img src="logo.png" alt="Constructive Reach Logo">
    </div>
    <h1>Constructive Reach</h1>
    <p class="subtitle">Candidate Information Portal</p>

    <form name="candidate_application" method="POST" data-netlify="true" enctype="multipart/form-data">
        <input type="hidden" name="form-name" value="candidate_application">

        <div class="grid">
            <div class="form-group">
                <label>Full Name</label>
                <input type="text" name="full_name" placeholder="Enter name" required>
            </div>
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" name="email" placeholder="email@domain.com" required>
            </div>
        </div>

        <div class="form-group">
            <label>Phone Number</label>
            <input type="tel" name="phone" placeholder="+123..." required>
        </div>

        <div class="grid">
            <div class="form-group">
                <label>Experience Level</label>
                <select name="experience" required>
                    <option value="entry">0-2 Years</option>
                    <option value="mid">3-5 Years</option>
                    <option value="senior">5+ Years</option>
                </select>
            </div>
            <div class="form-group">
                <label>Monthly Salary Expectation</label>
                <input type="text" name="salary" placeholder="e.g. $5000" required>
            </div>
        </div>

        <div class="form-group">
            <label id="fileLabel">Upload Resume (PDF or Word - Max 10MB)</label>
            <input type="file" name="resume" id="resume" accept=".pdf,.doc,.docx" required>
            <p id="sizeError" style="color: #e74c3c; font-size: 12px; display: none; margin-top: 5px;">File is too large! Please select a file under 10MB.</p>
        </div>

        <div class="form-group">
            <label>Cover Letter / Additional Info</label>
            <textarea name="message" rows="4" placeholder="Tell us why you are a good fit..."></textarea>
        </div>

        <button type="submit" class="btn-submit" id="submitBtn">Submit Application</button>
    </form>

    <script>
        const form = document.querySelector('form');
        const btn = document.querySelector('#submitBtn');
        const fileInput = document.querySelector('#resume');
        const sizeError = document.querySelector('#sizeError');

        fileInput.onchange = function() {
            if(this.files[0].size > 10485760) {
                sizeError.style.display = "block";
                this.value = "";
                btn.disabled = true;
                btn.style.opacity = "0.5";
            } else {
                sizeError.style.display = "none";
                btn.disabled = false;
                btn.style.opacity = "1";
            }
        };

        form.onsubmit = function() {
            btn.innerHTML = "🚀 Uploading Securely...";
            btn.style.background = "#10b981";
            btn.style.cursor = "not-allowed";
        };
    </script>
</div>

<footer>
    © 2026 Constructive Reach. Professional Recruitment Services.
</footer>

</body>
</html>
