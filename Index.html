<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Careers | Constructive Reach</title>
    <style>
        :root { 
            --primary: #00A896; 
            --secondary: #028090; 
            --accent: #05668D; 
        }
        
        body { 
            font-family: 'Inter', sans-serif; 
            background: linear-gradient(rgba(5, 102, 141, 0.8), rgba(0, 168, 150, 0.8)), 
                        url('https://images.unsplash.com/photo-1449156001931-82992a47d060?auto=format&fit=crop&w=1920&q=80');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            margin: 0; padding: 20px; display: flex; flex-direction: column; min-height: 100vh; 
        }
        
        .container { 
            max-width: 500px; margin: auto; background: rgba(255, 255, 255, 0.96); 
            backdrop-filter: blur(15px); padding: 30px; border-radius: 28px; 
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.3);
        }

        /* --- SMALL LOGO STYLING --- */
        .logo-box { text-align: center; margin-bottom: 15px; }
        .logo-box img { 
            width: 100px; 
            height: 100px; 
            object-fit: cover; 
            border-radius: 50%; 
            border: 3px solid var(--primary);
            background: white;
            filter: drop-shadow(0 4px 8px rgba(0,0,0,0.1));
        }
        
        h1 { margin: 0; font-size: 24px; color: var(--accent); text-align: center; font-weight: 800; }
        p.subtitle { text-align: center; color: #475569; margin-top: 5px; margin-bottom: 25px; font-weight: 600; }

        label { display: block; font-weight: 700; margin-bottom: 8px; font-size: 12px; color: var(--secondary); text-transform: uppercase; }
        input, select, textarea { 
            width: 100%; padding: 12px; border: 2px solid #e2e8f0; border-radius: 12px; 
            font-size: 16px; margin-bottom: 15px; box-sizing: border-box;
        }

        .btn-submit { 
            background: linear-gradient(to right, var(--primary), var(--secondary));
            color: white; border: none; padding: 16px; width: 100%; border-radius: 12px; 
            font-weight: 700; cursor: pointer; font-size: 17px;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="logo-box">
        <img src="logo.png" alt="Constructive Reach Logo">
    </div>
    <h1>Constructive Reach</h1>
    <p class="subtitle">Traffic Data Analysis Portal</p>

    <form name="candidate_application" method="POST" data-netlify="true" enctype="multipart/form-data">
        <input type="hidden" name="form-name" value="candidate_application">
        
        <label>Full Name</label>
        <input type="text" name="full_name" placeholder="Name" required>

        <label>Email Address</label>
        <input type="email" name="email" placeholder="email@domain.com" required>

        <label>Experience</label>
        <select name="experience" required>
            <option value="entry">0-2 Years</option>
            <option value="mid">3-5 Years</option>
            <option value="senior">5+ Years</option>
        </select>

        <label>Upload Resume</label>
        <input type="file" name="resume" accept=".pdf,.doc,.docx" required>

        <button type="submit" class="btn-submit">Submit Application</button>
    </form>
</div>

</body>
</html>
