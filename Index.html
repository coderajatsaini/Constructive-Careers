<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Careers | Constructive Reach</title>
    <style>
        :root { 
            --primary: #00A896; 
            --secondary: #028090; 
            --accent: #05668D; 
            --white: #ffffff;
        }
        
        body { 
            font-family: 'Inter', system-ui, -apple-system, sans-serif; 
            background: linear-gradient(rgba(5, 102, 141, 0.8), rgba(0, 168, 150, 0.8)), 
                        url('https://images.unsplash.com/photo-1449156001931-82992a47d060?auto=format&fit=crop&w=1920&q=80');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            margin: 0; padding: 20px; display: flex; flex-direction: column; min-height: 100vh; color: #1e293b;
        }
        
        .container { 
            max-width: 650px; margin: auto; background: rgba(255, 255, 255, 0.98); 
            backdrop-filter: blur(15px); padding: 40px; border-radius: 32px; 
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.3); border: 1px solid rgba(255, 255, 255, 0.4);
        }

        /* FIXED LOGO: Circular 100px Style */
        .logo-box { text-align: center; margin-bottom: 25px; }
        .logo-box img { 
            width: 100px; height: 100px; 
            object-fit: cover; border-radius: 50%; 
            border: 3px solid var(--primary); background: white;
            filter: drop-shadow(0 4px 12px rgba(0,0,0,0.15));
        }
        
        h1 { margin: 0; font-size: 26px; color: var(--accent); text-align: center; font-weight: 800; }
        p.subtitle { text-align: center; color: #475569; margin-top: 5px; margin-bottom: 30px; font-weight: 600; }

        .form-group { margin-bottom: 22px; }
        label { display: block; font-weight: 700; margin-bottom: 8px; font-size: 13px; color: var(--secondary); text-transform: uppercase; }
        
        input, select, textarea { 
            width: 100%; padding: 14px; border: 2px solid #e2e8f0; border-radius: 14px; 
            font-size: 16px; transition: all 0.3s ease; box-sizing: border-box; background: rgba(248, 250, 252, 0.9);
        }

        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }

        .btn-submit { 
            background: linear-gradient(to right, var(--primary), var(--secondary));
            color: white; border: none; padding: 18px; width: 100%; border-radius: 14px; 
            font-weight: 700; cursor: pointer; font-size: 17px; margin-top: 15px; transition: all 0.4s ease;
        }
        
        .btn-submit:hover { transform: translateY(-3px); box-shadow: 0 20px 25px -5px rgba(0, 168, 150, 0.5); }
        @media (max-width: 500px) { .grid { grid-template-columns: 1fr; } .container { padding: 30px 20px; } }
    </style>
</head>
<body>

<div class="container">
    <div class="logo-box">
        <img src="logo.png" alt="Constructive Reach Logo">
    </div>
    <h1>Constructive Reach</h1>
    <p class="subtitle">Careers & Application Portal</p>

    <form action="https://getform.io/f/2zfhbm2f0nv" method="POST" enctype="multipart/form-data">

        <div class="grid">
            <div class="form-group">
                <label>Full Name</label>
                <input type="text" name="name" placeholder="John Doe" required>
            </div>
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" name="email" placeholder="email@domain.com" required>
            </div>
        </div>

        <div class="form-group">
            <label>Phone Number</label>
            <input type="tel" name="phone" placeholder="+1..." required>
        </div>

        <div class="grid">
            <div class="form-group">
                <label>Experience</label>
                <select name="experience" required>
                    <option value="0-2">0-2 Years</option>
                    <option value="3-5">3-5 Years</option>
                    <option value="5+">5+ Years</option>
                </select>
            </div>
            <div class="form-group">
                <label>Expected Monthly Salary</label>
                <input type="text" name="salary" placeholder="e.g. $5000" required>
            </div>
        </div>

        <div class="form-group">
            <label>Upload Resume / Portfolio (Any File - Max 10MB)</label>
            <input type="file" name="file" id="resume" required>
            <p id="sizeError" style="color: #e74c3c; font-size: 12px; display: none; margin-top: 5px;">File exceeds 10MB limit.</p>
        </div>

        <div class="form-group">
            <label>Cover Letter / Additional Info</label>
            <textarea name="message" rows="4" placeholder="Tell us about yourself..."></textarea>
        </div>

        <button type="submit" class="btn-submit" id="submitBtn">Submit Application</button>
    </form>

    <script>
        const btn = document.querySelector('#submitBtn');
        const fileInput = document.querySelector('#resume');
        const sizeError = document.querySelector('#sizeError');

        fileInput.onchange = function() {
            // Checks for 10MB limit to keep backend healthy
            if(this.files[0].size > 10485760) {
                sizeError.style.display = "block";
                this.value = "";
                btn.disabled = true;
                btn.style.opacity = "0.5";
            } else {
                sizeError.style.display = "none";
                btn.disabled = false;
                btn.style.opacity = "1";
            }
        };

        const form = document.querySelector('form');
        form.onsubmit = function() {
            btn.innerHTML = "🚀 Sending Securely...";
            btn.style.background = "#10b981";
        };
    </script>
</div>

<footer style="text-align: center; padding: 30px; font-size: 13px; color: white; font-weight: 600;">
    © 2026 Constructive Reach. Traffic Intelligence Solutions.
</footer>

</body>
</html>
